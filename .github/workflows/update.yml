name: Update WK 2026 cheat sheet

# Plaats dit bestand in de repo als: .github/workflows/update.yml

on:
  schedule:
    # Elke 10 minuten (tijden in UTC). GitHub kan geplande runs vertragen.
    # Wil je het rustiger? Zet bv. '*/30 * * * *' (elk half uur).
    - cron: '*/30 * * * *'
  workflow_dispatch: {}          # handmatige "Run workflow"-knop

permissions:
  contents: write                # nodig om de bijgewerkte index.html terug te pushen

concurrency:
  group: update-cheatsheet       # voorkomt overlappende runs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo uitchecken
        uses: actions/checkout@v4

      - name: Python opzetten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: index.html genereren
        env:
          # Premium key vereist: de gratis key '123' geeft maar 15 seizoensevents terug.
          TSDB_KEY: ${{ secrets.TSDB_KEY }}
        run: |
          if [ -z "$TSDB_KEY" ]; then
            echo "TSDB_KEY secret ontbreekt; de gratis key levert geen volledig WK-schema." >&2
            exit 1
          fi
          python generate.py

      - name: Committen en pushen (alleen bij wijziging)
        run: |
          if git diff --quiet -- index.html data.json; then
            echo "Geen wijziging in de standen — niets te committen."
          else
            git config user.name  "wk-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html data.json
            git commit -m "Auto-update standen ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
